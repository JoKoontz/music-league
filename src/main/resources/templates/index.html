<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Music League</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar">
    <a class="navbar-logo" th:href="@{/}">Music League</a>

    <div class="navbar-links">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/guess-game}">Guess The Song</a>
        <a th:href="@{/login}">Login</a>
        <a th:href="@{/register}">Register</a>
    </div>
</nav>
<div class="container">
    <h1>Music League</h1>
    <p>Welcome to the Music League app. Create leagues, submit songs, vote on tracks, or try a bonus game mode.</p>

    <div class="nav">
        <a th:href="@{/login}">Login</a>
        <a th:href="@{/register}">Register</a>
    </div>

    <div class="card">
        <h3>Bonus Mode</h3>
        <p>Try the Guess The Song mini-game from the homepage.</p>
        <a th:href="@{/guess-game}">
            <button type="button">Play Guess The Song</button>
        </a>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
    <h1>Register</h1>

    <form th:action="@{/register}" method="post" th:object="${registerDto}">
        <input type="text" th:field="*{username}" placeholder="Username" required><br>
        <input type="email" th:field="*{email}" placeholder="Email" required><br>
        <input type="password" th:field="*{password}" placeholder="Password" required><br>

        <button type="submit">Register</button>
    </form>

    <a th:href="@{/login}">Back to Login</a>
</body>
</html>
